<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#f4f2ee"/>

  <!-- Concentric arcs - centred at bottom-centre, opening upward -->
  <!-- Arc 1 - outermost -->
  <path d="M 8 46 A 24 24 0 0 1 56 46" fill="none" stroke="#b8965a" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Arc 2 -->
  <path d="M 13 46 A 19 19 0 0 1 51 46" fill="none" stroke="#b8965a" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Arc 3 -->
  <path d="M 18 46 A 14 14 0 0 1 46 46" fill="none" stroke="#b8965a" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Arc 4 - innermost -->
  <path d="M 23 46 A 9 9 0 0 1 41 46" fill="none" stroke="#b8965a" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Centre dot -->
  <circle cx="32" cy="46" r="2.2" fill="#b8965a"/>

  <!-- Vertical drop line -->
  <line x1="32" y1="48" x2="32" y2="56" stroke="#b8965a" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Bottom dot -->
  <circle cx="32" cy="57" r="1.6" fill="#b8965a"/>
</svg>
